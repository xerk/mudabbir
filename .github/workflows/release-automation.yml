name: Release Please

# Disabled automatic runs on this fork — release-please is an upstream
# Dograh release process that doesn't apply here and fails on every push.
# Kept available for manual runs only.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Config files location
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Use PAT to trigger deployment workflow
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}