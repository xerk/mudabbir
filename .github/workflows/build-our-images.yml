name: Build & Push Our Images

# Builds the api + ui images from THIS fork (including the pipecat submodule and
# all our changes) and pushes them to GitHub Container Registry under the repo
# owner's namespace — e.g. ghcr.io/xerk/dograh-api and ghcr.io/xerk/dograh-ui.
#
# Auth uses the built-in GITHUB_TOKEN (no DockerHub or extra secrets needed).
# Deploy by setting REGISTRY=ghcr.io/<owner> in your server .env.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to publish (besides latest + short SHA)."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: build-our-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: dograh-api
            dockerfile: api/Dockerfile
          - name: dograh-ui
            dockerfile: ui/Dockerfile
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # lowercased owner namespace, e.g. ghcr.io/xerk/dograh-api
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
